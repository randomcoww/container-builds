name: nvidia-nemotron-3-nano-omni-30b-a3b-reasoning-ud-q8-k-xl build
on:
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  TARGET: nvidia-nemotron-3-nano-omni-30b-a3b-reasoning-ud-q8-k-xl

jobs:
  build:
    runs-on: kaniko-${{ github.event.repository.name }}
    container:
      image: ghcr.io/osscontainertools/kaniko:v1.27.5-debug@sha256:6f2a60489f03ce7ab78240c82c27358cfa394cfa7b91ee6b0bb72fc66f21c520
    permissions:
      contents: read
    steps:
    - name: Build and release container
      run: |
        set -e

        executor \
          --context-sub-path="$TARGET" \
          --dockerfile="./Containerfile" \
          --context="${{ github.repositoryUrl }}#${{ github.ref }}#${{ github.sha }}" \
          --destination="$INTERNAL_REGISTRY/${{ github.repository_owner }}/${{ env.TARGET }}:v$(date -u +%s)" \
          --registry-certificate=$INTERNAL_REGISTRY=$DOCKER_CONFIG/ca.crt \
          --registry-client-cert=$INTERNAL_REGISTRY=$DOCKER_CONFIG/client.cert,$DOCKER_CONFIG/client.key \
          --image-download-retry=4 \
          --image-fs-extract-retry=4 \
          --push-retry=4 \
          --snapshot-mode=redo \
          --use-new-run \
          --single-snapshot \
          --cleanup \
          --cache=false \
          --compressed-caching=false