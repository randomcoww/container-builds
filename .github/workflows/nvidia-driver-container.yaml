name: nvidia-driver-container build
on:
  workflow_dispatch:
  schedule:
  - cron: "0 14 * * 1"
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  TARGET: nvidia-driver-container
  # renovate: datasource=golang-version depName=go
  GOLANG_VERSION: 1.26.1
  # renovate: datasource=github-releases depName=NVIDIA/open-gpu-kernel-modules
  DRIVER_VERSION: 595.45.04
  # renovate: datasource=github-releases depName=fifofonix/gpu-driver-container
  BUILDER_VERSION: 25.11.17-fedora
  FEDORA_VERSION: 43

jobs:
  build:
    runs-on: builder-${{ github.event.repository.name }}
    container:
      image: ghcr.io/osscontainertools/kaniko:v1.27.0-debug
    permissions:
      contents: read
    steps:
    - name: Build and release container
      run: |
        set -e
        TARGETARCH=$(arch)
        BASE_URL=https://us.download.nvidia.com/XFree86/${TARGETARCH/x86_64/Linux-x86_64}
        TARGETARCH=${TARGETARCH/x86_64/amd64} && TARGETARCH=${TARGETARCH/aarch64/arm64}

        cat > $DOCKER_CONFIG/config.json <<EOF
        {
          "auths": {
            "ghcr.io": {
              "auth": "$(echo -n ${{ github.repository_owner }}:${{ secrets.GITHUB_TOKEN }} | base64 -w0)"
            }
          }
        }
        EOF
        echo -e "$INTERNAL_CA_CERT" > $DOCKER_CONFIG/internal.crt

        executor \
          --context-sub-path="fedora" \
          --dockerfile="./Dockerfile" \
          --context="git://github.com/fifofonix/gpu-driver-container.git#$BUILDER_VERSION" \
          --destination="ghcr.io/${{ github.repository_owner }}/${{ env.TARGET }}:v$DRIVER_VERSION-fedora$FEDORA_VERSION" \
          --destination="$INTERNAL_REGISTRY/${{ github.repository_owner }}/${{ env.TARGET }}:v$DRIVER_VERSION.$(date -u +%s)-fedora$FEDORA_VERSION" \
          --registry-certificate=$INTERNAL_REGISTRY=$DOCKER_CONFIG/internal.crt \
          --build-arg TARGETARCH=$TARGETARCH \
          --build-arg GOLANG_VERSION=$GOLANG_VERSION \
          --build-arg FEDORA_VERSION=$FEDORA_VERSION \
          --build-arg DRIVER_VERSION=$DRIVER_VERSION \
          --build-arg BASE_URL=$BASE_URL \
          --image-download-retry=4 \
          --image-fs-extract-retry=4 \
          --push-retry=4 \
          --snapshot-mode=redo \
          --use-new-run \
          --single-snapshot \
          --cleanup \
          --cache=false

  cleanup:
    needs:
    - build
    runs-on: builder-${{ github.event.repository.name }}
    container:
      image: docker.io/node:25.8.1-alpine
    permissions:
      packages: write
    steps:
    - name: Remove old container images
      uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
      with:
        package-name: ${{ env.TARGET }}
        package-type: container
        min-versions-to-keep: 4
        ignore-versions: latest
        token: ${{ secrets.GITHUB_TOKEN }}